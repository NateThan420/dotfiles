[general]
import = ["/home/nate/.config/alacritty/themes/monokai_charcoal_white.toml"]

[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1"

[font]
normal = { family = "Fira Code", style = "Regular"}
size = 12

[window]
dynamic_padding = true
opacity=0.5

[scrolling]
history = 10000
multiplier = 3

[colors]
draw_bold_text_with_bright_colors = true

[general]
live_config_reload = true
working_directory = "None"
