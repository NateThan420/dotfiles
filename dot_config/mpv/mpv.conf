# --- Video & Hardware Acceleration ---
# Use the newer video output backend (highly optimized, handles modern color spaces well)
vo=gpu-next
# Use Vulkan or OpenGL depending on what plays nicest with your compositor
gpu-api=vulkan
# Hardware decoding (safe copy-back method prevents playback lag or crashing)
hwdec=auto-safe

# --- Quality Defaults ---
# Base high-quality preset for smart scaling fallbacks
profile=high-quality
# Deband settings (helps fix color banding in streams or compressed files)
deband=yes
deband-iterations=4
deband-threshold=48
deband-range=16
deband-grain=48

# --- Subtitles ---
# Search fuzzily for external subtitles with similar filenames
sub-auto=fuzzy
# Better fonts and scaling
sub-font="sans-serif"
sub-bold=yes
sub-font-size=36

# --- Network / Streaming Buffering (yt-dlp) ---
# Limit max streaming resolution to 1080p to keep resource usage tight
ytdl-format="bestvideo[height<=?1080]+bestaudio/best"
# Generous memory allocation for pre-loading video stream data into RAM
demuxer-max-bytes=150M
demuxer-max-back-bytes=75M


# --- Shaders ---
# Sets KrigBilateral as a baseline color enhancer for all videos
glsl-shaders="~~/shaders/KrigBilateral.glsl:~~/shaders/ravu-lite-ar-r4.hook"

# --- Audio ---
# Stable volume
af=dynaudnorm=g=5:f=250:r=0.9:p=0.5
